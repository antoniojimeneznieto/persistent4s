version = "3.10.7"

# ── Dialect ────────────────────────────────────────────────────────────────────
# Change to scala213, scala212, or sbt1 to match your project
runner.dialect = scala3

# ── Column limit ───────────────────────────────────────────────────────────────
maxColumn = 120

# ── Alignment ─────────────────────────────────────────────────────────────────
# "most" preset aligns <- and = together in for-comprehensions,
# plus =>, ->, and common operators. multiline=false keeps it stable and idempotent.
align.preset    = most
align.multiline = false

# Extra tokens to align (sbt operators and common infix)
align.tokens."+" = [
  { code = "<-",  owner = "Enumerator.Generator" },
  { code = "=",   owner = "Enumerator.Val" },
  { code = ":=",  owner = "Term.ApplyInfix" },
  { code = "+=",  owner = "Term.ApplyInfix" },
  { code = "++=", owner = "Term.ApplyInfix" },
  { code = "-=",  owner = "Term.ApplyInfix" },
  { code = "--=", owner = "Term.ApplyInfix" },
]

# Result: for-comprehensions look like this:
#   for {
#     name   <- IO(...)
#     value  =  compute(name)
#     result <- transform(value)
#   } yield result

align.arrowEnumeratorGenerator = true   # align <- in for generators
align.openParenCallSite         = false  # don't align on open paren
align.openParenDefnSite         = false

# ── Newlines ───────────────────────────────────────────────────────────────────
newlines.topLevelBodyIfMinStatements = [before, after]
newlines.topLevelBodyMinStatements   = 1
newlines.avoidForSimpleOverflow      = [slc, tooLong]
newlines.topLevelStatementBlankLines = [
  {
    blanks    = 1,
    minBreaks = 0,
    regex     = "^(?!((Term\\.Apply)|(Defn\\.Object)))"
  }
]

# ── Indentation ────────────────────────────────────────────────────────────────
indent.main     = 2
indent.callSite = 2
indent.defnSite = 2

# ── Trailing commas ────────────────────────────────────────────────────────────
trailingCommas = always

# ── Strings ────────────────────────────────────────────────────────────────────
assumeStandardLibraryStripMargin = true

# ── Rewrite rules ──────────────────────────────────────────────────────────────
rewrite.rules = [
  RedundantBraces,
  RedundantParens,
  SortModifiers,
  PreferCurlyFors,
  Imports,
]

rewrite.redundantBraces.maxLines            = 1
rewrite.redundantBraces.stringInterpolation = true
rewrite.redundantBraces.generalExpressions  = false

rewrite.sortModifiers.order = [
  "implicit", "final", "sealed", "abstract",
  "override", "private", "protected",
  "lazy", "open", "transparent", "inline", "infix", "opaque"
]

# ── Literal argument lists ─────────────────────────────────────────────────────
binPack.literalArgumentLists     = true
binPack.literalsIncludeSimpleExpr = true
binPack.literalsExclude          = ["Term.Name"]

# ── Unicode arrows → ASCII ─────────────────────────────────────────────────────
rewriteTokens = {
  "⇒": "=>"
  "→": "->"
  "←": "<-"
}

# ── Docstrings ─────────────────────────────────────────────────────────────────
docstrings.style       = SpaceAsterisk
docstrings.wrap        = yes
docstrings.oneline     = fold
docstrings.removeEmpty = true

# ── Dangling parentheses ───────────────────────────────────────────────────────
danglingParentheses.preset = true

# ── Chain select ───────────────────────────────────────────────────────────────
includeCurlyBraceInSelectChains = false

# ── Project scope ──────────────────────────────────────────────────────────────
project.git          = true
project.includePaths = ["glob:**.scala", "glob:**.sbt", "glob:**.sc", "glob:**.md"]
project.excludePaths = ["glob:**/target/**", "glob:**/.metals/**", "glob:**/.bloop/**", "glob:**metals.sbt"]