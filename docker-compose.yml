services:
  postgres:
    image: postgres:16
    container_name: dcb_postgres
    environment:
      POSTGRES_USER: dcb
      POSTGRES_PASSWORD: dcb
      POSTGRES_DB: eventlog
    ports:
      - "5445:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcb -d eventlog"]
      interval: 5s
      timeout: 5s
      retries: 5
